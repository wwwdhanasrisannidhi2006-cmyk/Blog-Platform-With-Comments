{% extends "base.html" %}
{% block content %}
<h2>All Blog Posts</h2>
<hr>
{% for post in posts %}
    <div class="card mb-3">
        <div class="card-body">
            <h3><a href="{{ url_for('post_detail', post_id=post.id) }}" class="text-decoration-none">{{ post.title }}</a></h3>
            <small class="text-muted">By {{ post.author.username }} on {{ post.date_posted.strftime('%Y-%m-%d') }}</small>
            <p class="card-text mt-2">{{ post.content[:200] }}...</p>
        </div>
    </div>
{% endfor %}
{% endblock %}
